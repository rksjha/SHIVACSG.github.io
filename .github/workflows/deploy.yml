# ============================================================
#  Shiva Consultancy Group — Auto Build & Deploy
#  Triggers: every push to main branch
#
#  What it does:
#  1. Runs the Python gallery builder (auto-generates all pages)
#  2. Deploys the full site to GitHub Pages automatically
# ============================================================

name: Build & Deploy SCG Website

on:
  push:
    branches: ["main"]
  workflow_dispatch:      # Allow manual trigger from GitHub UI

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Build gallery pages
        run: |
          echo "Building SCG gallery pages..."
          python3 scripts/build_galleries.py

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
